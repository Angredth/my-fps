
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js FPS - Audio Integrated</title>
  <style>
  body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
  background-color: #000;
  }


  #blocker {
  position: absolute;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 24px;
  cursor: pointer;
  text-align: center;
  z-index: 10;
  line-height: 1.5;
  padding: 24px;
  box-sizing: border-box;
  }


  #crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 6px;
  height: 6px;
  background: rgba(255, 0, 0, 0.7);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  transition: opacity 0.1s;
  z-index: 4;
  }


  #minimap {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 180px;
  height: 180px;
  background: rgba(0, 0, 0, 0.6);
  border: 2px solid #ffffff;
  border-radius: 10px;
  z-index: 5;
  pointer-events: none;
  }


  #weapon-ui {
  position: absolute;
  bottom: 30px;
  right: 30px;
  color: white;
  font-size: 20px;
  font-weight: bold;
  background: rgba(0, 0, 0, 0.5);
  padding: 10px 20px;
  border-radius: 5px;
  border: 1px solid #aaa;
  z-index: 5;
  pointer-events: none;
  }
  </style>
</head>
<body>
  <div id="blocker">
  화면을 클릭하면 시작합니다.<br>
  이동: WASD, 기울이기: Q/E, 시점: 마우스, 사격: 좌클릭, 정조준: 우클릭 토글, 스코프 배율: Alt+우클릭, 무기교체: 1번 / 2번<br>
  환경음, 발소리, 무기별 격발음이 함께 재생됩니다.
  </div>
  <div id="crosshair"></div>
  <canvas id="minimap"></canvas>
  <div id="weapon-ui">WEAPON: M4A1</div>


  <script type="importmap">
  {
  "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
  }
  }
  </script>


  <script type="module">
  import * as THREE from 'three';
  import * as CANNON from 'cannon-es';


  const scene = new THREE.Scene();


  // Physics World Setup
  const physicsWorld = new CANNON.World();
  physicsWorld.gravity.set(0, -9.82, 0);
  physicsWorld.defaultContactMaterial.friction = 0.4;
  physicsWorld.defaultContactMaterial.restitution = 0.3;
  const ragdollBodies = [];  // Track ragdoll bodies for updates


  const vertexShader = `
  varying vec3 vWorldPosition;
  void main() {
  vec4 worldPosition = modelMatrix * vec4(position, 1.0);
  vWorldPosition = worldPosition.xyz;
  gl_Position = projectionMatrix * viewMatrix * worldPosition;
  }
  `;


  const fragmentShader = `
  uniform vec3 topColor;
  uniform vec3 bottomColor;
  uniform float offset;
  uniform float exponent;
  varying vec3 vWorldPosition;
  void main() {
  float h = normalize(vWorldPosition + offset).y;
  gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
  }
  `;


  const skyGeo = new THREE.SphereGeometry(450, 32, 15);
  const skyMat = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms: {
  topColor: { value: new THREE.Color(0x1a4c80) },
  bottomColor: { value: new THREE.Color(0xffffff) },
  offset: { value: 33 },
  exponent: { value: 0.6 }
  },
  side: THREE.BackSide
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);


  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 5);


  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);


  const light = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(light);


  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(40, 80, 40);
  dirLight.castShadow = true;
  scene.add(dirLight);


  const mapTileSize = 70;
  const mapTileSegments = 24;
  const mapTiles = [
  { gx: 0, gz: 0 },
  { gx: 1, gz: 0 },
  { gx: 1, gz: 1 }
  ];
  const mapOriginX = -mapTileSize;
  const mapOriginZ = -mapTileSize;
  const worldSize = mapTileSize * 2;


  function terrainFormula(x, z) {
  return Math.sin(x * 0.08) * Math.cos(z * 0.08) * 2.5 + Math.sin(x * 0.2) * 0.5;
  }


  function isInsideMap(x, z, padding = 0) {
  return mapTiles.some(({ gx, gz }) => {
  const minX = mapOriginX + gx * mapTileSize + padding;
  const maxX = minX + mapTileSize - padding * 2;
  const minZ = mapOriginZ + gz * mapTileSize + padding;
  const maxZ = minZ + mapTileSize - padding * 2;
  return x >= minX && x <= maxX && z >= minZ && z <= maxZ;
  });
  }


  function randomMapPoint(padding = 4) {
  const tile = mapTiles[Math.floor(Math.random() * mapTiles.length)];
  const minX = mapOriginX + tile.gx * mapTileSize + padding;
  const minZ = mapOriginZ + tile.gz * mapTileSize + padding;
  return {
  x: minX + Math.random() * (mapTileSize - padding * 2),
  z: minZ + Math.random() * (mapTileSize - padding * 2)
  };
  }


  function getRandomPatrolTarget(originX, originZ, radius = 24, padding = 3) {
  for (let attempt = 0; attempt < 20; attempt++) {
  const x = originX + (Math.random() - 0.5) * radius;
  const z = originZ + (Math.random() - 0.5) * radius;
  if (isInsideMap(x, z, padding)) return new THREE.Vector3(x, 0, z);
  }
  const fallback = randomMapPoint(padding);
  return new THREE.Vector3(fallback.x, 0, fallback.z);
  }


  function createLShapedFloorGeometry() {
  const vertices = [];
  const indices = [];


  mapTiles.forEach(({ gx, gz }) => {
  const startIndex = vertices.length / 3;
  const minX = mapOriginX + gx * mapTileSize;
  const minZ = mapOriginZ + gz * mapTileSize;


  for (let zIndex = 0; zIndex <= mapTileSegments; zIndex++) {
  for (let xIndex = 0; xIndex <= mapTileSegments; xIndex++) {
  const x = minX + (xIndex / mapTileSegments) * mapTileSize;
  const z = minZ + (zIndex / mapTileSegments) * mapTileSize;
  vertices.push(x, terrainFormula(x, z), z);
  }
  }


  for (let zIndex = 0; zIndex < mapTileSegments; zIndex++) {
  for (let xIndex = 0; xIndex < mapTileSegments; xIndex++) {
  const a = startIndex + zIndex * (mapTileSegments + 1) + xIndex;
  const b = a + 1;
  const c = a + (mapTileSegments + 1);
  const d = c + 1;
  indices.push(a, c, b, b, c, d);
  }
  }
  });


  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  return geometry;
  }


  const floorGeo = createLShapedFloorGeometry();


  const floorMat = new THREE.MeshStandardMaterial({ color: 0x4d7c2a, roughness: 0.9, flatShading: true });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.receiveShadow = true;
  scene.add(floor);
  floor.updateMatrixWorld(true);


  // Physics body for terrain floor
  const posAttr = floorGeo.attributes.position;
  const indices = floorGeo.index ? Array.from(floorGeo.index.array) :
    Array.from({length: posAttr.count}, (_, i) => i);
 
  const vertices = [];
  for (let i = 0; i < posAttr.count; i++) {
    vertices.push(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i));
  }
 
  const terrainShape = new CANNON.Trimesh(vertices, indices);
  const terrainBody = new CANNON.Body({ mass: 0, shape: terrainShape });
  physicsWorld.addBody(terrainBody);


  const terrainRaycaster = new THREE.Raycaster();
  const terrainRayOrigin = new THREE.Vector3();
  const terrainRayDirection = new THREE.Vector3(0, -1, 0);


  function getTerrainHeight(x, z) {
  if (!isInsideMap(x, z)) return 0;


  terrainRayOrigin.set(x, 120, z);
  terrainRaycaster.set(terrainRayOrigin, terrainRayDirection);
  terrainRaycaster.far = 260;


  const floorHit = terrainRaycaster.intersectObject(floor, false)[0];
  if (floorHit) return floorHit.point.y;


  return terrainFormula(x, z);
  }


  camera.position.set(35, getTerrainHeight(35, -35) + 1.8, -35);


  const collidableObjects = [];
  const visionBlockers = [floor];
  const buildingsData = [];
  const treesData = [];
  const targets = [];


  const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7, metalness: 0.2 });
  const accessoryMaterial = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.8, metalness: 0.1 });
  const steelMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.6 });
  const metalMaterial = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.3 });
  const metalGray = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.3 });
  const darkPlasticMaterial = new THREE.MeshStandardMaterial({ color: 0x151515, metalness: 0.2, roughness: 0.5 });
  const concreteWallMaterial = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.85, metalness: 0.05 });


  function createBoundaryWalls() {
  const wallHeight = 2;
  const wallThickness = 1.2;
  const wallSectionLength = 10;
  const tileKeys = new Set(mapTiles.map(({ gx, gz }) => `${gx},${gz}`));


  function hasTile(gx, gz) {
  return tileKeys.has(`${gx},${gz}`);
  }


  function addWallSection(centerX, centerZ, length, horizontal) {
  const y = (getTerrainHeight(centerX, centerZ) || terrainFormula(centerX, centerZ)) + wallHeight / 2;
  const geometry = horizontal
  ? new THREE.BoxGeometry(length, wallHeight, wallThickness)
  : new THREE.BoxGeometry(wallThickness, wallHeight, length);
  const wall = new THREE.Mesh(geometry, concreteWallMaterial);
  wall.position.set(centerX, y, centerZ);
  wall.castShadow = true;
  wall.receiveShadow = true;
  wall.userData = { type: 'building' };
  wall.userData.bounds = new THREE.Box3().setFromObject(wall);
  scene.add(wall);


  collidableObjects.push(wall);
  visionBlockers.push(wall);
  targets.push(wall);
  buildingsData.push({ x: centerX, z: centerZ, w: horizontal ? length : wallThickness, d: horizontal ? wallThickness : length });


  const wallShape = new CANNON.Box(new CANNON.Vec3(
  (horizontal ? length : wallThickness) / 2,
  wallHeight / 2,
  (horizontal ? wallThickness : length) / 2
  ));
  const wallBody = new CANNON.Body({ mass: 0, shape: wallShape });
  wallBody.position.set(centerX, y, centerZ);
  physicsWorld.addBody(wallBody);
  }


  function addEdge(startX, startZ, endX, endZ) {
  const horizontal = Math.abs(endX - startX) >= Math.abs(endZ - startZ);
  const length = horizontal ? Math.abs(endX - startX) : Math.abs(endZ - startZ);
  const sections = Math.max(1, Math.ceil(length / wallSectionLength));


  for (let i = 0; i < sections; i++) {
  const t0 = i / sections;
  const t1 = (i + 1) / sections;
  const centerX = THREE.MathUtils.lerp(startX, endX, (t0 + t1) / 2);
  const centerZ = THREE.MathUtils.lerp(startZ, endZ, (t0 + t1) / 2);
  addWallSection(centerX, centerZ, length / sections + wallThickness, horizontal);
  }
  }


  mapTiles.forEach(({ gx, gz }) => {
  const minX = mapOriginX + gx * mapTileSize;
  const maxX = minX + mapTileSize;
  const minZ = mapOriginZ + gz * mapTileSize;
  const maxZ = minZ + mapTileSize;


  if (!hasTile(gx, gz - 1)) addEdge(minX, minZ, maxX, minZ);
  if (!hasTile(gx, gz + 1)) addEdge(minX, maxZ, maxX, maxZ);
  if (!hasTile(gx - 1, gz)) addEdge(minX, minZ, minX, maxZ);
  if (!hasTile(gx + 1, gz)) addEdge(maxX, minZ, maxX, maxZ);
  });
  }


  createBoundaryWalls();


  function createM4A1Model() {
  const m4a1 = new THREE.Group();


  const receiver = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 0.25), bodyMaterial);
  receiver.position.set(0, 0.2, 0);
  m4a1.add(receiver);


  const magWell = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.25), bodyMaterial);
  magWell.position.set(0.4, -0.1, 0);
  m4a1.add(magWell);


  const magazine = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.2), accessoryMaterial);
  magazine.position.set(0.45, -0.5, 0);
  magazine.rotation.z = 0.2;
  m4a1.add(magazine);


  const grip = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.7, 0.2), accessoryMaterial);
  grip.position.set(-0.5, -0.3, 0);
  grip.rotation.z = -0.3;
  m4a1.add(grip);


  const handguardGeom = new THREE.CylinderGeometry(0.2, 0.2, 1.8, 8);
  handguardGeom.rotateZ(Math.PI / 2);
  const handguard = new THREE.Mesh(handguardGeom, accessoryMaterial);
  handguard.position.set(1.8, 0.25, 0);
  m4a1.add(handguard);


  const barrelGeom = new THREE.CylinderGeometry(0.08, 0.08, 1.2, 8);
  barrelGeom.rotateZ(Math.PI / 2);
  const barrel = new THREE.Mesh(barrelGeom, steelMaterial);
  barrel.position.set(3.1, 0.25, 0);
  m4a1.add(barrel);


  const hiderGeom = new THREE.CylinderGeometry(0.1, 0.09, 0.25, 8);
  hiderGeom.rotateZ(Math.PI / 2);
  const hider = new THREE.Mesh(hiderGeom, steelMaterial);
  hider.position.set(3.75, 0.25, 0);
  m4a1.add(hider);


  const frontSight = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), bodyMaterial);
  frontSight.position.set(3.5, 0.55, 0);
  m4a1.add(frontSight);


  const tubeGeom = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 8);
  tubeGeom.rotateZ(Math.PI / 2);
  const tube = new THREE.Mesh(tubeGeom, steelMaterial);
  tube.position.set(-1.3, 0.25, 0);
  m4a1.add(tube);


  const stock = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.5, 0.25), accessoryMaterial);
  stock.position.set(-1.8, 0.15, 0);
  m4a1.add(stock);


  const stockPad = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.25), accessoryMaterial);
  stockPad.position.set(-2.3, 0.1, 0);
  m4a1.add(stockPad);


  const handle = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 0.15), bodyMaterial);
  handle.position.set(-0.1, 0.5, 0);
  m4a1.add(handle);


  const handlePost1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.15), bodyMaterial);
  handlePost1.position.set(-0.5, 0.4, 0);
  const handlePost2 = handlePost1.clone();
  handlePost2.position.set(0.3, 0.4, 0);
  m4a1.add(handlePost1, handlePost2);


  m4a1.traverse((child) => {
  if (child instanceof THREE.Mesh) {
  child.castShadow = true;
  child.receiveShadow = true;
  }
  });
  m4a1.rotation.y = -Math.PI / 2;
  return m4a1;
  }


  function createMP153Model() {
  const mp153 = new THREE.Group();


  const mpReceiver = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.36, 0.22), metalMaterial);
  mpReceiver.position.set(0, 0.2, 0);
  mp153.add(mpReceiver);


  const ejectionPort = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.14, 0.01), metalGray);
  ejectionPort.position.set(0.1, 0.22, 0.111);
  mp153.add(ejectionPort);


  const mpBarrelGeom = new THREE.CylinderGeometry(0.07, 0.07, 2.5, 8);
  mpBarrelGeom.rotateZ(Math.PI / 2);
  const mpBarrel = new THREE.Mesh(mpBarrelGeom, metalMaterial);
  mpBarrel.position.set(2.0, 0.26, 0);
  mp153.add(mpBarrel);


  const mpTubeGeom = new THREE.CylinderGeometry(0.06, 0.06, 2.0, 8);
  mpTubeGeom.rotateZ(Math.PI / 2);
  const mpTube = new THREE.Mesh(mpTubeGeom, metalMaterial);
  mpTube.position.set(1.75, 0.14, 0);
  mp153.add(mpTube);


  const mpHandguardGeom = new THREE.CylinderGeometry(0.13, 0.13, 1.4, 8);
  mpHandguardGeom.rotateZ(Math.PI / 2);
  const mpHandguard = new THREE.Mesh(mpHandguardGeom, darkPlasticMaterial);
  mpHandguard.position.set(1.2, 0.14, 0);
  mp153.add(mpHandguard);


  const mpStock = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.38, 0.2), darkPlasticMaterial);
  mpStock.position.set(-1.4, 0.06, 0);
  mpStock.rotation.z = -0.12;
  mp153.add(mpStock);


  const mpGrip = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.45, 0.18), darkPlasticMaterial);
  mpGrip.position.set(-0.6, -0.15, 0);
  mpGrip.rotation.z = -0.42;
  mp153.add(mpGrip);


  mp153.traverse((child) => {
  if (child instanceof THREE.Mesh) {
  child.castShadow = true;
  child.receiveShadow = true;
  }
  });
  mp153.rotation.y = -Math.PI / 2;
  return mp153;
  }


  for (let i = 0; i < 15; i++) {
  const bWidth = 4;
  const bHeight = 12;
  const bDepth = 4;
  const boxGeo = new THREE.BoxGeometry(bWidth, bHeight, bDepth);
  const finalColor = Math.random() < 0.5 ? 0x333333 : 0xaaaaaa;
  const boxMat = new THREE.MeshStandardMaterial({ color: finalColor, roughness: 0.6 });
  const box = new THREE.Mesh(boxGeo, boxMat);


  const buildingPoint = randomMapPoint(8);
  const bx = buildingPoint.x;
  const bz = buildingPoint.z;
  const by = getTerrainHeight(bx, bz) + bHeight / 2;


  box.position.set(bx, by, bz);
  box.castShadow = true;
  box.receiveShadow = true;
  box.userData = { type: 'building' };
  box.userData.bounds = new THREE.Box3().setFromObject(box);
  scene.add(box);


  targets.push(box);
  collidableObjects.push(box);
  visionBlockers.push(box);
  buildingsData.push({ x: bx, z: bz, w: bWidth, d: bDepth });
 
  // Physics body for building
  const buildingShape = new CANNON.Box(new CANNON.Vec3(bWidth / 2, bHeight / 2, bDepth / 2));
  const buildingBody = new CANNON.Body({ mass: 0, shape: buildingShape });
  buildingBody.position.set(bx, by, bz);
  physicsWorld.addBody(buildingBody);
  }


  for (let i = 0; i < 30; i++) {
  const tree = new THREE.Group();
  const trunkHeight = 5.2;
  const trunkGeo = new THREE.CylinderGeometry(0.28, 0.48, trunkHeight, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5a3d28, roughness: 0.9 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = trunkHeight / 2;
  trunk.castShadow = true;
  trunk.userData = { type: 'treeTrunk' };
  tree.add(trunk);
  targets.push(trunk);
  visionBlockers.push(trunk);


  const leavesGeo = new THREE.ConeGeometry(1.9, 4.2, 10);
  const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2e5c1e, roughness: 0.8 });
  const leaves = new THREE.Mesh(leavesGeo, leavesMat);
  leaves.position.y = trunkHeight + 1.1;
  leaves.castShadow = true;
  tree.add(leaves);
  visionBlockers.push(leaves);


  const treePoint = randomMapPoint(5);
  const tx = treePoint.x;
  const tz = treePoint.z;
  const ty = getTerrainHeight(tx, tz);


  tree.position.set(tx, ty, tz);
  scene.add(tree);


  const hitProxyGeo = new THREE.CylinderGeometry(0.85, 0.95, trunkHeight, 8);
  const hitProxyMat = new THREE.MeshBasicMaterial({ visible: false });
  const hitProxy = new THREE.Mesh(hitProxyGeo, hitProxyMat);
  hitProxy.position.set(tx, ty + trunkHeight / 2, tz);
  scene.add(hitProxy);


  hitProxy.userData.bounds = new THREE.Box3().setFromObject(hitProxy);
  collidableObjects.push(hitProxy);
  treesData.push({ x: tx, z: tz });
 
  // Physics body for tree trunk
  const trunkShape = new CANNON.Cylinder(0.95, 0.85, trunkHeight, 8);
  const trunkBody = new CANNON.Body({ mass: 0, shape: trunkShape });
  trunkBody.position.set(tx, ty + trunkHeight / 2, tz);
  physicsWorld.addBody(trunkBody);
  }


  const enemies = [];


  function createRagdoll(position, isM4Weapon) {
    const ragdoll = {
      bodies: [],
      constraints: [],
      meshes: []
    };


    const bodyColor = new THREE.Color(0xcc2222);
    const enemyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.5 });


    // Raise spawn position slightly to prevent clipping through terrain
    const spawnY = position.y + 1.2;


    // Torso (중심 바디)
    const torsoShape = new CANNON.Sphere(0.35);
    const torsoBody = new CANNON.Body({ mass: 3, shape: torsoShape, linearDamping: 0.5, angularDamping: 0.5 });
    torsoBody.position.set(position.x, spawnY + 0.95, position.z);
    physicsWorld.addBody(torsoBody);


    const torsoGeo = new THREE.CapsuleGeometry(0.45, 1.0, 8, 16);
    const torsoMesh = new THREE.Mesh(torsoGeo, enemyMat);
    torsoMesh.castShadow = true;
    torsoMesh.userData = { ragdollBody: torsoBody };
    scene.add(torsoMesh);


    ragdoll.bodies.push(torsoBody);
    ragdoll.meshes.push({ mesh: torsoMesh, body: torsoBody });


    // Head (머리)
    const headShape = new CANNON.Sphere(0.35);
    const headBody = new CANNON.Body({ mass: 1.5, shape: headShape, linearDamping: 0.3, angularDamping: 0.5 });
    headBody.position.set(position.x, spawnY + 2.15, position.z);
    physicsWorld.addBody(headBody);


    const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
    const headMesh = new THREE.Mesh(headGeo, enemyMat);
    headMesh.castShadow = true;
    headMesh.userData = { ragdollBody: headBody };
    scene.add(headMesh);


    ragdoll.bodies.push(headBody);
    ragdoll.meshes.push({ mesh: headMesh, body: headBody });


    // Weapon (무기)
    const weaponScale = 0.35;

  function ensureContext() {
  if (ctx) return ctx;


  ctx = new (window.AudioContext || window.webkitAudioContext)();


  const compressor = ctx.createDynamicsCompressor();
  compressor.threshold.value = -16;
  compressor.knee.value = 20;
  compressor.ratio.value = 5;
  compressor.attack.value = 0.005;
  compressor.release.value = 0.18;

  const convolver = ctx.createConvolver();
  convolver.buffer = createImpulse(1.15, 2.6);


  sfxBus.connect(master);
  sfxBus.connect(convolver);
  convolver.connect(reverbBus);
  reverbBus.connect(master);
  ambientBus.connect(master);
  master.connect(compressor);
  compressor.connect(ctx.destination);


  return ctx;
  }

  audio.preload = 'auto';
  audio.volume = 0.92;

  return audio;
  });
  };


  probe.addEventListener('loadeddata', activateSource, { once: true });
  probe.addEventListener('canplaythrough', activateSource, { once: true });
  probe.addEventListener('error', () => {}, { once: true });
  probe.load();
  });
  }


  function playShotgunSample(volumeScale = 1) {

  const audio = arSamplePool[arSampleIndex % arSamplePool.length];

  audio.pause();
  audio.currentTime = 0;

  function createNoiseBuffer(duration) {
  const sampleRate = ctx.sampleRate;
  const frameCount = Math.max(1, Math.floor(sampleRate * duration));
  const buffer = ctx.createBuffer(1, frameCount, sampleRate);
  const data = buffer.getChannelData(0);
  let last = 0;


  for (let i = 0; i < frameCount; i++) {
  const white = Math.random() * 2 - 1;
  last = last * 0.86 + white * 0.14;
  data[i] = last;
  }


  return buffer;
  }


  function createImpulse(duration, decay) {
  const sampleRate = ctx.sampleRate;
  const frameCount = Math.floor(sampleRate * duration);
  const buffer = ctx.createBuffer(2, frameCount, sampleRate);


  for (let channel = 0; channel < 2; channel++) {
  const data = buffer.getChannelData(channel);
  for (let i = 0; i < frameCount; i++) {
  const tail = Math.pow(1 - i / frameCount, decay);
  data[i] = (Math.random() * 2 - 1) * tail;
  }
  }


  return buffer;
  }


  function noiseBurst({
  start = ctx.currentTime,
  duration = 0.1,
  gain = 0.2,
  filterType = 'bandpass',
  frequency = 1600,
  q = 0.8,
  output = sfxBus
  } = {}) {
  const source = ctx.createBufferSource();
  source.buffer = createNoiseBuffer(duration);


  const filter = ctx.createBiquadFilter();
  filter.type = filterType;
  filter.frequency.setValueAtTime(frequency, start);
  filter.Q.value = q;


  const amp = ctx.createGain();
  amp.gain.setValueAtTime(0.0001, start);
  amp.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain), start + 0.006);
  amp.gain.exponentialRampToValueAtTime(0.0001, start + duration);


  source.connect(filter);
  filter.connect(amp);
  amp.connect(output);
  source.start(start);
  source.stop(start + duration + 0.02);
  }


  function tone({
  start = ctx.currentTime,
  duration = 0.08,
  gain = 0.1,
  type = 'sine',
  from = 120,
  to = 60,
  output = sfxBus
  } = {}) {
  const osc = ctx.createOscillator();
  const amp = ctx.createGain();


  osc.type = type;
  osc.frequency.setValueAtTime(from, start);
  osc.frequency.exponentialRampToValueAtTime(Math.max(1, to), start + duration);


  amp.gain.setValueAtTime(0.0001, start);
  amp.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain), start + 0.005);
  amp.gain.exponentialRampToValueAtTime(0.0001, start + duration);


  osc.connect(amp);
  amp.connect(output);
  osc.start(start);
  osc.stop(start + duration + 0.02);
  }


  function startAmbience() {
  if (!ctx || ambienceStarted) return;

  const wind = ctx.createBufferSource();
  wind.buffer = createNoiseBuffer(2.5);

  const windFilter = ctx.createBiquadFilter();

  const lfo = ctx.createOscillator();

  lfo.frequency.value = 0.055;
  lfoGain.gain.value = 0.018;

  lowAir.type = 'sine';

  lowAirGain.gain.value = 0.012;


  wind.connect(windFilter);
  windFilter.connect(ambientBus);
  lowAir.connect(lowAirGain);
  lowAirGain.connect(ambientBus);


  wind.start();
  lfo.start();
  lowAir.start();
  }

  function updateFootsteps(delta, moving, speedMultiplier = 1) {
  if (!ctx || ctx.state !== 'running') return;


  if (!moving) {

  const safeSpeed = Math.max(0.55, speedMultiplier);
  footstepTimer -= delta * safeSpeed;

  footstepTimer = 0.38;

  function getSurfaceNormalFromHit(hit) {

  const hD = getTerrainHeight(x, z - sampleGap);
  const hU = getTerrainHeight(x, z + sampleGap);
  return new THREE.Vector3(hL - hR, sampleGap * 2, hD - hU).normalize();
  }

  hole.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), surfaceNormal);


  const finalSize = size * THREE.MathUtils.randFloat(0.82, 1.18);
  hole.scale.set(finalSize, finalSize, finalSize);

  if (keys.d) moveVector.add(right);
  if (keys.a) moveVector.add(right.clone().negate());


  if (moveVector.lengthSq() > 0) {
  moveVector.normalize().multiplyScalar(moveSpeed * delta);
  const nextPosition = camera.position.clone().add(moveVector);
  let isColliding = !isInsideMap(nextPosition.x, nextPosition.z, playerRadius + 0.2);
  const playerBB = new THREE.Box3(
  new THREE.Vector3(nextPosition.x - playerRadius, nextPosition.y - 1.8, nextPosition.z - playerRadius),
  new THREE.Vector3(nextPosition.x + playerRadius, nextPosition.y + 1.0, nextPosition.z + playerRadius)
  );


  // Optimization: Use pre-calculated bounds
  for (let i = 0; i < collidableObjects.length; i++) {
  if (playerBB.intersectsBox(collidableObjects[i].userData.bounds)) {
  isColliding = true;
  break;
  }
  }


  if (!isColliding) {
  camera.position.x = nextPosition.x;
  camera.position.z = nextPosition.z;
  playerIsMoving = true;
  }
  }


  camera.position.y = THREE.MathUtils.lerp(
  camera.position.y,
  getTerrainHeight(camera.position.x, camera.position.z) + 1.8,
  0.3
  );
  }


  Sound.updateFootsteps(
  delta,
  document.pointerLockElement === document.body && playerIsMoving,
  isAiming ? 0.72 : 1.0
  );


  drawMinimap();


  if (isSwapping) {
  swapProgress += delta * 3.5;


  if (swapProgress >= 1.0) {
  swapProgress = 0;


  if (swapDirection === -1) {
  currentWeapon.mesh.visible = false;
  currentWeapon = pendingWeapon;
  currentWeapon.mesh.visible = true;
  updateWeaponUI();
  fullScope.visible = currentWeapon !== WEAPONS.MP153;
  swapDirection = 1;
  } else {
  isSwapping = false;
  swapOffsetPos.set(0, 0, 0);
  swapOffsetRot.set(0, 0, 0);
  }
  }


  if (isSwapping) {
  const t = swapProgress;
  if (swapDirection === -1) {
  swapOffsetPos.y = -0.7 * t;
  swapOffsetPos.z = -0.2 * t;
  swapOffsetRot.x = -Math.PI / 3.5 * t;
  } else {
  swapOffsetPos.y = -0.7 * (1.0 - t);
  swapOffsetPos.z = -0.2 * (1.0 - t);
  swapOffsetRot.x = -Math.PI / 3.5 * (1.0 - t);
  }
  }
  }


  if (isFiring && document.pointerLockElement === document.body) {
  fireTimer += delta;


  if (currentWeapon.automatic) {
  if (fireTimer >= currentWeapon.fireRate) {
  shootWeapon();
  fireTimer = 0;
  }
  } else if (!hasFiredSingle) {
  shootWeapon();
  hasFiredSingle = true;
  }
  } else {
  fireTimer = currentWeapon.fireRate;
  recoilCounter = 0;
  }


  if (activeFlash) {
  flashDuration -= delta;
  if (flashDuration <= 0) {
  scene.remove(activeFlash);
  activeFlash = null;
  }
  }


  for (let i = bullets.length - 1; i >= 0; i--) {
  const bullet = bullets[i];
  bullet.life -= delta;


  const currentBulletPos = bullet.element.position.clone();
  const moveStep = bullet.velocity.clone().multiplyScalar(delta);
  const nextBulletPos = currentBulletPos.clone().add(moveStep);
  const distanceThisFrame = moveStep.length();


  let isHit = false;


  raycaster.set(currentBulletPos, bullet.dir);
  const intersects = raycaster.intersectObjects(targets);


  if (intersects.length > 0 && intersects[0].distance <= distanceThisFrame) {
  createBulletHoleFromHit(intersects[0]);
  handleObjectHit(intersects[0].object, bullet.damage);
  isHit = true;
  }


  if (!isHit) {
  const floorIntersects = raycaster.intersectObject(floor, false);
  if (floorIntersects.length > 0 && floorIntersects[0].distance <= distanceThisFrame) {
  createBulletHole(floorIntersects[0].point, getSurfaceNormalFromHit(floorIntersects[0]), 0.14);
  isHit = true;
  }
  }


  const terrainY = getTerrainHeight(nextBulletPos.x, nextBulletPos.z);
  if (!isHit && nextBulletPos.y <= terrainY) {
  const floorImpactPos = nextBulletPos.clone();
  floorImpactPos.y = terrainY;
  createBulletHole(floorImpactPos, getTerrainNormal(floorImpactPos.x, floorImpactPos.z), 0.14);
  isHit = true;
  }


  if (isHit || bullet.life <= 0) {
  scene.remove(bullet.element);
  bullet.element.geometry.dispose();
  bullets.splice(i, 1);
  } else {
  bullet.element.position.copy(nextBulletPos);
  }
  }


  for (let i = enemyTracers.length - 1; i >= 0; i--) {
  enemyTracers[i].life -= delta;
  enemyTracers[i].material.opacity = enemyTracers[i].life / 0.05;


  if (enemyTracers[i].life <= 0) {
  scene.remove(enemyTracers[i].element);
  enemyTracers[i].element.geometry.dispose();
  enemyTracers[i].material.dispose();
  enemyTracers.splice(i, 1);
  }
  }


  horizontalRecoil = THREE.MathUtils.lerp(horizontalRecoil, 0, 0.2);
  yaw += horizontalRecoil;


  if (recoilTargetY > 0) {
  const nextRecoil = THREE.MathUtils.lerp(recoilTargetY, 0, 0.15);
  pitch -= (recoilTargetY - nextRecoil) * 0.5;
  recoilTargetY = nextRecoil;
  }


  pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
 
  // Q/E 카메라 틸트 업데이트
  if (keys.q) {
    targetRollZ = Math.PI / 4;  // 45도 좌측 기울임
  } else if (keys.e) {
    targetRollZ = -Math.PI / 4;  // 45도 우측 기울임
  } else {
    targetRollZ = 0;  // 기울임 해제
  }
  cameraRollZ = THREE.MathUtils.lerp(cameraRollZ, targetRollZ, 0.15);  // 부드러운 모션
 
  camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, cameraRollZ, 'YXZ'));


  scopeCamera.position.copy(camera.position);
  scopeCamera.quaternion.copy(camera.quaternion);
  scopeCamera.fov = currentWeapon === WEAPONS.M4A1 ? getScopeFov() : camera.fov;
  scopeCamera.updateProjectionMatrix();


  if (isAiming) {
  if (currentWeapon === WEAPONS.MP153) {
  targetLocalPos.set(0.018, -0.255, -0.36);
  aimOffsetRot.x = THREE.MathUtils.lerp(aimOffsetRot.x, shotgunAdsRotation.x, 0.24);
  aimOffsetRot.y = THREE.MathUtils.lerp(aimOffsetRot.y, shotgunAdsRotation.y, 0.24);
  aimOffsetRot.z = THREE.MathUtils.lerp(aimOffsetRot.z, shotgunAdsRotation.z, 0.24);
  } else {
  targetLocalPos.set(0.005 - scopeZoomMotionAmount * 0.018, -0.328 + scopeZoomMotionAmount * 0.014, -0.23);
  aimOffsetRot.x = THREE.MathUtils.lerp(aimOffsetRot.x, -scopeZoomMotionAmount * 0.015, 0.24);
  aimOffsetRot.y = THREE.MathUtils.lerp(aimOffsetRot.y, 0, 0.24);
  aimOffsetRot.z = THREE.MathUtils.lerp(aimOffsetRot.z, 0, 0.24);
  }


  currentLocalPos.lerp(targetLocalPos, 0.25);
  } else {
  targetLocalPos.set(0.2, -0.35 + recoilTargetY * 0.5, -0.5);
  currentLocalPos.lerp(targetLocalPos, 0.2);
  aimOffsetRot.x = THREE.MathUtils.lerp(aimOffsetRot.x, 0, 0.2);
  aimOffsetRot.y = THREE.MathUtils.lerp(aimOffsetRot.y, 0, 0.2);
  aimOffsetRot.z = THREE.MathUtils.lerp(aimOffsetRot.z, 0, 0.2);
  }


  const finalWeaponWorldPos = currentLocalPos.clone().add(swapOffsetPos).applyQuaternion(camera.quaternion).add(camera.position);
  weaponGroup.position.copy(finalWeaponWorldPos);


  const combinedQuat = camera.quaternion.clone()
  .multiply(new THREE.Quaternion().setFromEuler(swapOffsetRot))
  .multiply(new THREE.Quaternion().setFromEuler(aimOffsetRot));
  weaponGroup.quaternion.copy(combinedQuat).multiply(r180Y);


  // Only render scope if current weapon has one (M4A1)
  if (currentWeapon === WEAPONS.M4A1) {
    weaponGroup.visible = false;
    renderer.setRenderTarget(scopeRenderTarget);
    renderer.render(scene, scopeCamera);
  }


  weaponGroup.visible = true;
  renderer.setRenderTarget(null);
  renderer.render(scene, camera);


  // 렌더링 후 다음 프레임의 이동/충돌 연산을 위해 카메라 위치를 원래 루트 위치로 복구
  camera.position.copy(playerLogicPos);
  }


  window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  });


  scene.updateMatrixWorld(true);
  animate();
  </script>
</body>
</html>
