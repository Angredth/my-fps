<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gun ADS Pose Tuner</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b0c;
      --panel: rgba(12, 15, 16, 0.92);
      --line: rgba(170, 186, 190, 0.34);
      --text: #edf3f2;
      --muted: #a7b2b4;
      --accent: #d2dde3;
      --warn: #ffd166;
      --danger: #ff7166;
      --ok: #96df75;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: Arial, sans-serif; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 4;
      width: 16px;
      height: 16px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.85);
    }
    #crosshair::before { left: 7px; top: 0; width: 2px; height: 16px; }
    #crosshair::after { left: 0; top: 7px; width: 16px; height: 2px; }

    #hud {
      position: fixed;
      left: 18px;
      top: 18px;
      z-index: 6;
      display: grid;
      gap: 6px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.58);
      font-size: 13px;
      line-height: 1.35;
      pointer-events: none;
      white-space: pre-line;
    }
    #hud strong { color: #fff; }

    #panel {
      position: fixed;
      right: 14px;
      top: 14px;
      bottom: 14px;
      z-index: 7;
      width: 360px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.48);
      overflow: hidden;
    }
    h1 { margin: 0; font-size: 16px; letter-spacing: 0.02em; }
    .hint { color: var(--muted); font-size: 12px; line-height: 1.4; }
    .tabs, .segmented, .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 7px 9px;
      font-weight: 800;
      cursor: pointer;
    }
    button.active { border-color: #fff; background: rgba(255, 255, 255, 0.18); }
    button.warn { color: #111; background: var(--warn); border-color: #ffe7a4; }

    .scroll { overflow: auto; padding-right: 3px; }
    .grid { display: grid; gap: 8px; }
    .row {
      display: grid;
      grid-template-columns: 46px 1fr 76px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    label { color: var(--muted); font-weight: 800; }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    input[type="number"] {
      width: 76px;
      padding: 5px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.52);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    pre {
      min-height: 150px;
      max-height: 220px;
      margin: 0;
      padding: 9px;
      overflow: auto;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.46);
      color: #dfe8e8;
      font-size: 11px;
      line-height: 1.35;
      white-space: pre-wrap;
    }
    .metric { display: grid; grid-template-columns: 1fr auto; gap: 8px; color: var(--muted); font-size: 12px; }
    .metric strong { color: var(--text); }
    .metric.safe strong { color: var(--ok); }
    .metric.risk strong { color: var(--warn); }
    .metric.bad strong { color: var(--danger); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="crosshair"></div>
  <div id="hud"></div>
  <aside id="panel">
    <div>
      <h1>Gun ADS Pose Tuner</h1>
      <div class="hint">1 M4A1 · 2 MP-153 · 3 FN 5-7 · 4 AKS-74U · 5 DVL-10 · V 근접무기 · H/J/K Hip/ADS/Scope · 우클릭 ADS · Q/E Lean · 마우스휠 사격</div>
    </div>

    <div class="tabs">
      <button data-weapon="M4A1" class="active">1 M4A1</button>
      <button data-weapon="MP153">2 MP-153</button>
      <button data-weapon="FN57">3 FN 5-7</button>
      <button data-weapon="AKS74U">4 AKS-74U</button>
      <button data-weapon="DVL10">5 DVL-10</button>
      <button data-weapon="MELEE">V Knife</button>
      <button id="aimButton">ADS</button>
    </div>

    <div class="scroll">
      <div class="grid">
        <div class="segmented">
          <button data-pose="hip" class="active">Hip</button>
          <button data-pose="ads">ADS</button>
          <button data-pose="scope">Scope</button>
        </div>

        <div id="controls"></div>

        <div class="metric" id="nearMetric"><span>nearest weapon z</span><strong>-</strong></div>
        <div class="metric" id="scopeMetric"><span>M4 scope length</span><strong>-</strong></div>
        <div class="metric" id="fireMetric"><span>wheel fire preview</span><strong>ready</strong></div>
        <div class="metric"><span>camera.near</span><strong>0.03</strong></div>

        <pre id="configOutput"></pre>
      </div>
    </div>

    <div class="actions">
      <button id="copyConfig">Copy Config</button>
      <button id="applyToSkov">Apply to SKOV</button>
      <button id="resetPose" class="warn">Reset Current</button>
    </div>
  </aside>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const hud = document.getElementById('hud');
    const controlsRoot = document.getElementById('controls');
    const dvl10PivotPanel = document.createElement('div');
    const configOutput = document.getElementById('configOutput');
    const nearMetric = document.getElementById('nearMetric');
    const scopeMetric = document.getElementById('scopeMetric');
    const fireMetric = document.getElementById('fireMetric');

    dvl10PivotPanel.id = 'dvl10PivotPanel';
    dvl10PivotPanel.style.display = 'none';
    dvl10PivotPanel.style.border = '1px solid var(--line)';
    dvl10PivotPanel.style.padding = '8px';
    dvl10PivotPanel.style.background = 'rgba(0,0,0,0.35)';
    dvl10PivotPanel.style.fontSize = '12px';
    controlsRoot.after(dvl10PivotPanel);

    const FPS_CAMERA_NEAR = 0.03;
    const WORLD_UNITS_PER_METER = 1;
    const M4A1_REAL_LENGTH = 0.838 * WORLD_UNITS_PER_METER;
    const MP153_REAL_LENGTH = 1.25 * WORLD_UNITS_PER_METER;
    const AKS74U_REAL_LENGTH = 0.730 * WORLD_UNITS_PER_METER;
    const DVL10_REAL_LENGTH = 1.13 * WORLD_UNITS_PER_METER;
    const WEAPON_MODEL_CDN_BASE = 'https://cdn.jsdelivr.net/gh/Angredth/my-fps@main/5.28/index/';
    const FN57_MODEL_CDN_URL = `${WEAPON_MODEL_CDN_BASE}57.js`;
    const ER_FULCRUM_MODEL_CDN_URL = `${WEAPON_MODEL_CDN_BASE}er-fulcrum.js`;
    const AKS74U_MODEL_URLS = [
      'https://cdn.jsdelivr.net/gh/Angredth/my-fps@main/Suck/low-poly_aks-74u.glb',
      'https://raw.githubusercontent.com/Angredth/my-fps/main/Suck/low-poly_aks-74u.glb'
    ];
    const DVL10_MODEL_URLS = [
      '../../dvl-10.glb',
      'https://cdn.jsdelivr.net/gh/Angredth/my-fps@main/Suck/dvl-10.glb',
      'https://raw.githubusercontent.com/Angredth/my-fps/main/Suck/dvl-10.glb'
    ];
    const POSE_BRIDGE_STORAGE_KEY = 'skov.weaponPose.v1';
    const FN57_MODEL_SCALE = 0.355 / 9.285;
    const KNIFE_MODEL_SCALE = 0.310 / 11.679;
    const FN57_SKOV_MODEL_TRANSFORM = {
      position: new THREE.Vector3(0.18, -0.2, 0.02),
      rotation: new THREE.Euler(0, -Math.PI / 2, 0),
      scale: new THREE.Vector3(FN57_MODEL_SCALE, FN57_MODEL_SCALE, FN57_MODEL_SCALE)
    };
    const KNIFE_SKOV_MODEL_TRANSFORM = {
      position: new THREE.Vector3(0.25, -0.12, 0.2),
      rotation: new THREE.Euler(Math.PI / 2, Math.PI / 2, Math.PI),
      scale: new THREE.Vector3(KNIFE_MODEL_SCALE, KNIFE_MODEL_SCALE, KNIFE_MODEL_SCALE)
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121719);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, FPS_CAMERA_NEAR, 1000);
    camera.position.set(0, 1.65, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x243039, 1.8));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.4);
    keyLight.position.set(2.5, 5, 3);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const grid = new THREE.GridHelper(24, 24, 0x627078, 0x2b3438);
    grid.position.y = -0.05;
    scene.add(grid);

    const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7, metalness: 0.2 });
    const accessoryMaterial = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.8, metalness: 0.1 });
    const steelMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.6 });
    const metalMaterial = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.3 });
    const metalGray = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.3 });
    const darkPlasticMaterial = new THREE.MeshStandardMaterial({ color: 0x151515, metalness: 0.2, roughness: 0.5 });

    window.THREE = THREE;

    function loadClassicScript(src) {
      return new Promise((resolve, reject) => {
        const existing = Array.from(document.scripts).find((script) => script.src === src);
        if (existing) {
          resolve();
          return;
        }
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.crossOrigin = 'anonymous';
        script.onload = () => resolve();
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.append(script);
      });
    }

    function loadGLTF(loader, url) {
      return new Promise((resolve, reject) => {
        loader.load(url, resolve, undefined, reject);
      });
    }

    let createRemoteFN57Model = null;
    try {
      await loadClassicScript(FN57_MODEL_CDN_URL);
      createRemoteFN57Model = window.createFN57HighQuality;
      if (typeof createRemoteFN57Model !== 'function') throw new Error('createFN57HighQuality global not found');
    } catch (error) {
      console.error('FN57 CDN 모델을 불러오지 못했습니다. 내장 FN57 모델을 사용합니다.', error);
    }

    let createRemoteKnifeModel = null;
    try {
      const fulcrumModule = await import(ER_FULCRUM_MODEL_CDN_URL);
      createRemoteKnifeModel = fulcrumModule.createTacticalBayonetModel || fulcrumModule.default;
      if (typeof createRemoteKnifeModel !== 'function') throw new Error('createTacticalBayonetModel export not found');
    } catch (error) {
      console.error('ER Fulcrum CDN 모델을 불러오지 못했습니다. 내장 근접무기 모델을 사용합니다.', error);
    }

    function normalizeWeaponLength(model, targetLength) {
      model.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      box.getSize(size);
      if (!Number.isFinite(size.x) || size.x <= 0) return model;
      model.scale.multiplyScalar(targetLength / size.x);
      model.updateMatrixWorld(true);
      return model;
    }

    function setShadows(root) {
      root.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
    }

    function centerModelOnPivot(model, pivotName) {
      model.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const pivot = new THREE.Group();
      pivot.name = pivotName;
      model.position.sub(center);
      pivot.add(model);
      return pivot;
    }

    function createM4A1Model() {
      const m4a1 = new THREE.Group();
      m4a1.name = 'M4A1';

      const receiver = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 0.25), bodyMaterial);
      receiver.position.set(0, 0.2, 0);
      m4a1.add(receiver);

      const magWell = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.25), bodyMaterial);
      magWell.position.set(0.4, -0.1, 0);
      m4a1.add(magWell);

      const magazine = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.2), accessoryMaterial);
      magazine.position.set(0.45, -0.5, 0);
      magazine.rotation.z = 0.2;
      m4a1.add(magazine);

      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.7, 0.2), accessoryMaterial);
      grip.position.set(-0.5, -0.3, 0);
      grip.rotation.z = -0.3;
      m4a1.add(grip);

      const handguardGeom = new THREE.CylinderGeometry(0.2, 0.2, 1.8, 8);
      handguardGeom.rotateZ(Math.PI / 2);
      const handguard = new THREE.Mesh(handguardGeom, accessoryMaterial);
      handguard.position.set(1.8, 0.25, 0);
      m4a1.add(handguard);

      const barrelGeom = new THREE.CylinderGeometry(0.08, 0.08, 1.2, 8);
      barrelGeom.rotateZ(Math.PI / 2);
      const barrel = new THREE.Mesh(barrelGeom, steelMaterial);
      barrel.position.set(3.1, 0.25, 0);
      m4a1.add(barrel);

      const hiderGeom = new THREE.CylinderGeometry(0.1, 0.09, 0.25, 8);
      hiderGeom.rotateZ(Math.PI / 2);
      const hider = new THREE.Mesh(hiderGeom, steelMaterial);
      hider.position.set(3.75, 0.25, 0);
      m4a1.add(hider);

      const frontSight = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), bodyMaterial);
      frontSight.position.set(3.5, 0.55, 0);
      m4a1.add(frontSight);

      const tubeGeom = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 8);
      tubeGeom.rotateZ(Math.PI / 2);
      const tube = new THREE.Mesh(tubeGeom, steelMaterial);
      tube.position.set(-1.3, 0.25, 0);
      m4a1.add(tube);

      const stock = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.5, 0.25), accessoryMaterial);
      stock.position.set(-1.8, 0.15, 0);
      m4a1.add(stock);

      const stockPad = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.25), accessoryMaterial);
      stockPad.position.set(-2.3, 0.1, 0);
      m4a1.add(stockPad);

      const handle = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 0.15), bodyMaterial);
      handle.position.set(-0.1, 0.5, 0);
      m4a1.add(handle);

      const handlePost1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.15), bodyMaterial);
      handlePost1.position.set(-0.5, 0.4, 0);
      const handlePost2 = handlePost1.clone();
      handlePost2.position.set(0.3, 0.4, 0);
      m4a1.add(handlePost1, handlePost2);

      setShadows(m4a1);
      normalizeWeaponLength(m4a1, M4A1_REAL_LENGTH);

      const m4CarryHandleTopAnchor = new THREE.Object3D();
      const m4Scale = m4a1.scale.x || 1;
      m4CarryHandleTopAnchor.name = 'M4_CARRY_HANDLE_TOP_ANCHOR';
      m4CarryHandleTopAnchor.position.set(-0.02 / m4Scale, 0.09 / m4Scale, 0);
      m4CarryHandleTopAnchor.scale.set(1 / m4Scale, 1 / m4Scale, 1 / m4Scale);
      m4a1.add(m4CarryHandleTopAnchor);

      m4a1.rotation.y = -Math.PI / 2;
      return m4a1;
    }

    function createMP153Model() {
      const mp153 = new THREE.Group();
      mp153.name = 'MP-153';

      const mpReceiver = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.36, 0.22), metalMaterial);
      mpReceiver.position.set(0, 0.2, 0);
      mp153.add(mpReceiver);

      const ejectionPort = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.14, 0.01), metalGray);
      ejectionPort.position.set(0.1, 0.22, 0.111);
      mp153.add(ejectionPort);

      const mpBarrelGeom = new THREE.CylinderGeometry(0.07, 0.07, 2.5, 8);
      mpBarrelGeom.rotateZ(Math.PI / 2);
      const mpBarrel = new THREE.Mesh(mpBarrelGeom, metalMaterial);
      mpBarrel.position.set(2.0, 0.26, 0);
      mp153.add(mpBarrel);

      const mpTubeGeom = new THREE.CylinderGeometry(0.06, 0.06, 2.0, 8);
      mpTubeGeom.rotateZ(Math.PI / 2);
      const mpTube = new THREE.Mesh(mpTubeGeom, metalMaterial);
      mpTube.position.set(1.75, 0.14, 0);
      mp153.add(mpTube);

      const mpHandguardGeom = new THREE.CylinderGeometry(0.13, 0.13, 1.4, 8);
      mpHandguardGeom.rotateZ(Math.PI / 2);
      const mpHandguard = new THREE.Mesh(mpHandguardGeom, darkPlasticMaterial);
      mpHandguard.position.set(1.2, 0.14, 0);
      mp153.add(mpHandguard);

      const mpStock = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.38, 0.2), darkPlasticMaterial);
      mpStock.position.set(-1.4, 0.06, 0);
      mpStock.rotation.z = -0.12;
      mp153.add(mpStock);

      const mpGrip = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.45, 0.18), darkPlasticMaterial);
      mpGrip.position.set(-0.6, -0.15, 0);
      mpGrip.rotation.z = -0.42;
      mp153.add(mpGrip);

      setShadows(mp153);
      normalizeWeaponLength(mp153, MP153_REAL_LENGTH);
      mp153.rotation.y = -Math.PI / 2;
      return mp153;
    }

    async function createAKS74UModel() {
      const loader = new GLTFLoader();
      for (const url of AKS74U_MODEL_URLS) {
        try {
          const gltf = await loadGLTF(loader, url);
          const aks = gltf.scene || gltf.scenes?.[0];
          if (!aks) throw new Error('AKS-74U scene not found');
          aks.name = 'AKS-74U GLB';
          setShadows(aks);
          normalizeWeaponLength(aks, AKS74U_REAL_LENGTH);
          aks.rotation.y = -Math.PI / 2;
          const pivot = centerModelOnPivot(aks, 'AKS-74U Pivot');
          pivot.userData.recoilPivot = 'center-after-forward-axis-fix';
          pivot.userData.modelSource = url;
          return pivot;
        } catch (error) {
          console.error(`AKS-74U GLB를 불러오지 못했습니다: ${url}`, error);
        }
      }
      console.error('AKS-74U GLB fallback까지 실패했습니다. 내장 AKS-74U 모델을 사용합니다.');
      return createFallbackAKS74UModel();
    }

    function createFallbackAKS74UModel() {
      const aks = new THREE.Group();
      aks.name = 'AKS-74U Fallback';
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.16, 0.18), bodyMaterial);
      body.position.set(0, 0.08, 0);
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.35, 12), steelMaterial);
      barrel.rotation.z = Math.PI / 2;
      barrel.position.set(0.42, 0.1, 0);
      const stock = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.08, 0.14), accessoryMaterial);
      stock.position.set(-0.42, 0.08, 0);
      const magazine = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.34, 0.13), darkPlasticMaterial);
      magazine.position.set(-0.02, -0.14, 0);
      magazine.rotation.z = 0.18;
      aks.add(body, barrel, stock, magazine);
      setShadows(aks);
      normalizeWeaponLength(aks, AKS74U_REAL_LENGTH);
      aks.rotation.y = -Math.PI / 2;
      aks.userData.recoilPivot = 'center-after-forward-axis-fix';
      return aks;
    }

    const dvl10State = {
      chambered: true,
      needsBolt: false,
      cyclingBolt: false,
      ammoInMag: 5,
      cycleTime: 0,
      autoBoltPending: false,
      autoBoltDelay: 0.12,
      autoBoltTimer: 0
    };
    const DVL10_BOLT_ACTION = {
      duration: 0.95,
      travel: 65.0,
      travelAxis: 'x',
      travelSign: 1
    };
    const DVL10_BOLT_PIVOT = {
      // Debug starting value. Tune this after checking the red pivot marker in the scene.
      offset: new THREE.Vector3(40.0000, 13.6290, 17.5620),
      rotateAxis: 'x',
      liftSign: 0.9,
      liftAngle: THREE.MathUtils.degToRad(70),
    };
    const DVL10_BOLT_DEBUG = {
      visible: true,
      axisLineLength: 0.36,
      axisLineColor: 0x00ffff,
      pivotColor: 0xff0000,
      axesSize: 0.08
    };
    const dvl10ActionWeaponOffsetPos = new THREE.Vector3();
    const dvl10ActionWeaponOffsetRot = new THREE.Euler();
    const DVL10_ACTION_POSE = {
      yawAmount: THREE.MathUtils.degToRad(4.5),
      yawSign: 1,
      pitchAmount:THREE.MathUtils.degToRad(3.0),
      pitchSign: 2,
      rollAmount: THREE.MathUtils.degToRad(5.5),
      rollSign: 1,
      screenSideAmount: 0.018,
      screenSideSign: -1,
      down: -0.018,
      back: 0.025,
      poseAmount: 1.0
    };
    let dvl10BoltMesh = null;
    let dvl10BoltSlide = null;
    let dvl10BoltRotate = null;
    let dvl10BoltOriginalParent = null;
    const dvl10BoltBasePosition = new THREE.Vector3();
    const dvl10BoltBaseRotation = new THREE.Euler();
    const dvl10BoltRawPivotLocal = new THREE.Vector3();
    const dvl10BoltCurrentPivotLocal = new THREE.Vector3();

    function clamp01(value) {
      return THREE.MathUtils.clamp(value, 0, 1);
    }

    function smooth01(value) {
      const x = clamp01(value);
      return x * x * (3 - 2 * x);
    }

    function segmentProgress(t, start, end) {
      return smooth01((t - start) / (end - start));
    }

    function normalizeDVL10NodeName(name) {
      return String(name || '')
        .replace(/_/g, '.')
        .replace(/^Cylinder(\d{3})(?=\.|$)/, 'Cylinder.$1');
    }

    function findDVL10BoltNode(dvl10Root) {
      const exact = dvl10Root.getObjectByName('Cylinder.006');
      if (exact) return exact;

      let materialChildMatch = null;
      let sanitizedMatch = null;
      dvl10Root.traverse((object) => {
        const normalizedName = normalizeDVL10NodeName(object.name);
        if (!sanitizedMatch && normalizedName === 'Cylinder.006') {
          sanitizedMatch = object;
        }
        if (!materialChildMatch && normalizedName.startsWith('Cylinder.006.Material')) {
          materialChildMatch = object.parent || object;
        }
      });
      return sanitizedMatch || materialChildMatch;
    }

    function getDVL10BoltChildMeshNames(bolt) {
      const names = [];
      bolt.traverse((object) => {
        if (object.isMesh) names.push(normalizeDVL10NodeName(object.name) || '(unnamed mesh)');
      });
      return names;
    }

    function getDVL10BoltBodyMeshes(bolt) {
      const bodyMeshes = [];

      bolt.traverse((object) => {
        if (!object.isMesh) return;

        const normalizedName = normalizeDVL10NodeName(object.name);
        if (
          normalizedName.includes('Cylinder.006') &&
          (
            normalizedName.includes('Material.003') ||
            normalizedName.includes('Material.004')
          ) &&
          !normalizedName.includes('Material.005')
        ) {
          bodyMeshes.push(object);
        }
      });

      return bodyMeshes;
    }

    function computeDVL10BoltAxisPivotWorld(bolt) {
      const bodyMeshes = getDVL10BoltBodyMeshes(bolt);

      if (bodyMeshes.length === 0) {
        console.warn(
          '[DVL-10] 볼트 원통 몸체 mesh를 찾지 못했습니다. 전체 Box3 fallback을 사용합니다.',
          getDVL10BoltChildMeshNames(bolt)
        );
        const fallbackBox = new THREE.Box3().setFromObject(bolt);
        return fallbackBox.getCenter(new THREE.Vector3());
      }

      const bodyBox = new THREE.Box3();
      bodyMeshes.forEach((mesh) => {
        mesh.updateWorldMatrix(true, false);
        bodyBox.expandByObject(mesh);
      });

      console.log('[DVL-10] 볼트 원통 몸체 pivot 후보 mesh', bodyMeshes.map((mesh) => normalizeDVL10NodeName(mesh.name)));
      return bodyBox.getCenter(new THREE.Vector3());
    }

    function createDVL10BoltXAxisLine() {
      const half = DVL10_BOLT_DEBUG.axisLineLength * 0.5;
      const start = new THREE.Vector3(-half, 0, 0);
      const end = new THREE.Vector3(half, 0, 0);
      const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
      const material = new THREE.LineBasicMaterial({
        color: DVL10_BOLT_DEBUG.axisLineColor,
        depthTest: false,
        depthWrite: false
      });
      const line = new THREE.Line(geometry, material);
      line.name = 'DVL10_BoltPivot_XAxisLine';
      line.renderOrder = 999;
      return line;
    }

    function disposeDVL10DebugObject(object) {
      if (object.geometry) object.geometry.dispose();
      if (Array.isArray(object.material)) {
        object.material.forEach((material) => material.dispose());
      } else if (object.material) {
        object.material.dispose();
      }
    }

    function addDVL10BoltPivotDebug() {
      if (!dvl10BoltRotate) return;

      const oldNames = [
        'DVL10_BoltPivot_DebugSphere',
        'DVL10_BoltPivot_DebugAxes',
        'DVL10_BoltPivot_XAxisLine'
      ];

      oldNames.forEach((name) => {
        const existing = dvl10BoltRotate.getObjectByName(name);
        if (!existing) return;
        dvl10BoltRotate.remove(existing);
        disposeDVL10DebugObject(existing);
      });

      if (!DVL10_BOLT_DEBUG.visible) return;

      const marker = new THREE.Mesh(
        new THREE.SphereGeometry(0.008, 8, 8),
        new THREE.MeshBasicMaterial({
          color: DVL10_BOLT_DEBUG.pivotColor,
          depthTest: false,
          depthWrite: false
        })
      );
      marker.name = 'DVL10_BoltPivot_DebugSphere';
      marker.renderOrder = 1000;

      const axes = new THREE.AxesHelper(DVL10_BOLT_DEBUG.axesSize);
      axes.name = 'DVL10_BoltPivot_DebugAxes';
      axes.renderOrder = 999;

      const xAxisLine = createDVL10BoltXAxisLine();

      dvl10BoltRotate.add(marker);
      dvl10BoltRotate.add(axes);
      dvl10BoltRotate.add(xAxisLine);
    }

    function setupDVL10BoltRig(dvl10Root) {
      if (!dvl10Root) return;

      const bolt = findDVL10BoltNode(dvl10Root);
      if (!bolt) {
        const dvlNames = [];
        dvl10Root.traverse((object) => {
          if (object.name) dvlNames.push(object.name);
        });
        console.warn('[DVL-10] Cylinder.006 볼트 메쉬를 찾지 못했습니다.', dvlNames);
        return;
      }

      dvl10BoltMesh = bolt;
      dvl10BoltMesh.userData.dvl10BoltName = 'Cylinder.006';
      bolt.updateWorldMatrix(true, false);

      const oldParent = bolt.parent;
      if (!oldParent) {
        console.warn('[DVL-10] Cylinder.006 parent가 없습니다.');
        return;
      }

      oldParent.updateWorldMatrix(true, false);

      const pivotWorld = computeDVL10BoltAxisPivotWorld(bolt);
      const rawPivotLocal = pivotWorld.clone();
      oldParent.worldToLocal(rawPivotLocal);

      dvl10BoltOriginalParent = oldParent;
      dvl10BoltRawPivotLocal.copy(rawPivotLocal);

      const pivotLocal = rawPivotLocal.clone().add(DVL10_BOLT_PIVOT.offset);
      dvl10BoltCurrentPivotLocal.copy(pivotLocal);

      dvl10BoltSlide = new THREE.Group();
      dvl10BoltSlide.name = 'DVL10_BoltSlide';
      dvl10BoltSlide.position.copy(pivotLocal);

      dvl10BoltRotate = new THREE.Group();
      dvl10BoltRotate.name = 'DVL10_BoltRotate';

      oldParent.add(dvl10BoltSlide);
      dvl10BoltSlide.add(dvl10BoltRotate);
      dvl10BoltRotate.attach(bolt);

      dvl10BoltBasePosition.copy(dvl10BoltSlide.position);
      dvl10BoltBaseRotation.copy(dvl10BoltRotate.rotation);

      bolt.userData.isDVL10Bolt = true;
      addDVL10BoltPivotDebug();
      console.log('[DVL-10] Cylinder.006 볼트 리그 구성 완료', {
        bolt,
        slide: dvl10BoltSlide,
        rotate: dvl10BoltRotate
      });
    }

    function applyDVL10BoltPivotOffsetFromUI() {
      if (!dvl10BoltMesh || !dvl10BoltSlide || !dvl10BoltRotate || !dvl10BoltOriginalParent) return;
      if (dvl10State.cyclingBolt || dvl10State.autoBoltPending) {
        DVL10_BOLT_PIVOT.offset.copy(dvl10BoltBasePosition).sub(dvl10BoltRawPivotLocal);
        syncDVL10BoltPivotControls();
        return;
      }

      dvl10BoltMesh.updateWorldMatrix(true, false);
      dvl10BoltOriginalParent.attach(dvl10BoltMesh);

      dvl10BoltCurrentPivotLocal
        .copy(dvl10BoltRawPivotLocal)
        .add(DVL10_BOLT_PIVOT.offset);

      dvl10BoltSlide.position.copy(dvl10BoltCurrentPivotLocal);
      dvl10BoltBasePosition.copy(dvl10BoltSlide.position);
      dvl10BoltRotate.rotation.copy(dvl10BoltBaseRotation);

      dvl10BoltOriginalParent.updateWorldMatrix(true, true);
      dvl10BoltSlide.updateWorldMatrix(true, true);
      dvl10BoltRotate.updateWorldMatrix(true, true);

      dvl10BoltRotate.attach(dvl10BoltMesh);
      addDVL10BoltPivotDebug();
      syncDVL10BoltPivotControls();
    }

    function canFireCurrentWeapon() {
      if (currentWeaponKey === 'DVL10') {
        return (
          dvl10State.chambered &&
          !dvl10State.needsBolt &&
          !dvl10State.cyclingBolt &&
          !dvl10State.autoBoltPending
        );
      }
      return true;
    }

    function onDVL10Fired() {
      dvl10State.chambered = false;
      dvl10State.needsBolt = true;
      dvl10State.autoBoltPending = true;
      dvl10State.autoBoltTimer = 0;
    }

    function startDVL10BoltCycle() {
      if (currentWeaponKey !== 'DVL10') return;
      if (!dvl10State.needsBolt) return;
      if (dvl10State.cyclingBolt) return;
      if (!dvl10BoltSlide || !dvl10BoltRotate) return;

      dvl10State.cyclingBolt = true;
      dvl10State.cycleTime = 0;
    }

    function updateDVL10AutoBolt(delta) {
      if (currentWeaponKey !== 'DVL10') return;
      if (!dvl10State.autoBoltPending) return;
      if (!dvl10State.needsBolt) {
        dvl10State.autoBoltPending = false;
        dvl10State.autoBoltTimer = 0;
        return;
      }
      if (dvl10State.cyclingBolt) return;

      dvl10State.autoBoltTimer += delta;

      if (dvl10State.autoBoltTimer >= dvl10State.autoBoltDelay) {
        dvl10State.autoBoltPending = false;
        dvl10State.autoBoltTimer = 0;
        startDVL10BoltCycle();
      }
    }

    function updateDVL10ActionWeaponPoseFromBoltT(t) {
      if (!dvl10State.cyclingBolt) {
        dvl10ActionWeaponOffsetPos.set(0, 0, 0);
        dvl10ActionWeaponOffsetRot.set(0, 0, 0);
        return;
      }

      const enter = segmentProgress(t, 0.00, 0.18);
      const exit = segmentProgress(t, 0.78, 1.00);
      const hold = enter * (1 - exit);
      const amount = hold * DVL10_ACTION_POSE.poseAmount;

      dvl10ActionWeaponOffsetPos.set(
        DVL10_ACTION_POSE.screenSideAmount * DVL10_ACTION_POSE.screenSideSign * amount,
        DVL10_ACTION_POSE.down * amount,
        DVL10_ACTION_POSE.back * amount
      );

      dvl10ActionWeaponOffsetRot.set(
        0,
        DVL10_ACTION_POSE.yawAmount * DVL10_ACTION_POSE.yawSign * amount,
        DVL10_ACTION_POSE.rollAmount * DVL10_ACTION_POSE.rollSign * amount
      );
    }

    function applyDVL10BoltTravel(travel01) {
      if (!dvl10BoltSlide) return;

      dvl10BoltSlide.position.copy(dvl10BoltBasePosition);
      const offset = DVL10_BOLT_ACTION.travel * DVL10_BOLT_ACTION.travelSign * travel01;

      if (DVL10_BOLT_ACTION.travelAxis === 'x') {
        dvl10BoltSlide.position.x += offset;
      } else if (DVL10_BOLT_ACTION.travelAxis === 'y') {
        dvl10BoltSlide.position.y += offset;
      } else {
        dvl10BoltSlide.position.z += offset;
      }
    }

    function updateDVL10Bolt(delta) {
      if (!dvl10BoltSlide || !dvl10BoltRotate) return;

      if (!dvl10State.cyclingBolt) {
        applyDVL10BoltTravel(0);
        dvl10BoltRotate.rotation.copy(dvl10BoltBaseRotation);
        dvl10ActionWeaponOffsetPos.set(0, 0, 0);
        dvl10ActionWeaponOffsetRot.set(0, 0, 0);
        return;
      }

      dvl10State.cycleTime += delta;

      const t = clamp01(dvl10State.cycleTime / DVL10_BOLT_ACTION.duration);
      updateDVL10ActionWeaponPoseFromBoltT(t);

      const liftUp = segmentProgress(t, 0.18, 0.34);
      const pullBack = segmentProgress(t, 0.34, 0.56);
      const pushForward = segmentProgress(t, 0.56, 0.74);
      const liftDown = segmentProgress(t, 0.74, 0.88);

      let lift = 0;
      let travel = 0;

      if (t < 0.18) {
        lift = 0;
        travel = 0;
      } else if (t < 0.34) {
        lift = liftUp;
        travel = 0;
      } else if (t < 0.56) {
        lift = 1;
        travel = pullBack;
      } else if (t < 0.74) {
        lift = 1;
        travel = 1 - pushForward;
      } else if (t < 0.88) {
        lift = 1 - liftDown;
        travel = 0;
      } else {
        lift = 0;
        travel = 0;
      }

      applyDVL10BoltTravel(travel);

      dvl10BoltRotate.rotation.copy(dvl10BoltBaseRotation);
      const angle =
        DVL10_BOLT_PIVOT.liftAngle *
        DVL10_BOLT_PIVOT.liftSign *
        lift;

      if (DVL10_BOLT_PIVOT.rotateAxis === 'x') {
        dvl10BoltRotate.rotation.x += angle;
      } else if (DVL10_BOLT_PIVOT.rotateAxis === 'y') {
        dvl10BoltRotate.rotation.y += angle;
      } else {
        dvl10BoltRotate.rotation.z += angle;
      }

      if (t >= 1) {
        dvl10State.cyclingBolt = false;
        dvl10State.cycleTime = 0;
        dvl10State.needsBolt = false;

        applyDVL10BoltTravel(0);
        dvl10BoltRotate.rotation.copy(dvl10BoltBaseRotation);
        dvl10ActionWeaponOffsetPos.set(0, 0, 0);
        dvl10ActionWeaponOffsetRot.set(0, 0, 0);

        if (dvl10State.ammoInMag > 0) {
          dvl10State.ammoInMag -= 1;
          dvl10State.chambered = true;
        } else {
          dvl10State.chambered = false;
        }
      }
    }

    async function createDVL10Model() {
      const loader = new GLTFLoader();
      for (const url of DVL10_MODEL_URLS) {
        try {
          const gltf = await loadGLTF(loader, url);
          const rifle = gltf.scene || gltf.scenes?.[0];
          if (!rifle) throw new Error('DVL-10 scene not found');
          rifle.name = 'DVL-10 GLB';
          setShadows(rifle);
          normalizeWeaponLength(rifle, DVL10_REAL_LENGTH);
          rifle.rotation.y = Math.PI / 2;
          const pivot = centerModelOnPivot(rifle, 'DVL-10 Pivot');
          setupDVL10BoltRig(pivot);
          pivot.userData.modelSource = url;
          return pivot;
        } catch (error) {
          console.error(`DVL-10 GLB를 불러오지 못했습니다: ${url}`, error);
        }
      }
      console.error('DVL-10 GLB fallback까지 실패했습니다. 내장 DVL-10 모델을 사용합니다.');
      return createFallbackDVL10Model();
    }

    function getNearestWeaponZInCameraSpace(model, camera) {
      if (!model || !camera) return null;
      model.updateWorldMatrix(true, true);
      camera.updateWorldMatrix(true, true);
      const box = new THREE.Box3().setFromObject(model);
      const points = [
        new THREE.Vector3(box.min.x, box.min.y, box.min.z),
        new THREE.Vector3(box.min.x, box.min.y, box.max.z),
        new THREE.Vector3(box.min.x, box.max.y, box.min.z),
        new THREE.Vector3(box.min.x, box.max.y, box.max.z),
        new THREE.Vector3(box.max.x, box.min.y, box.min.z),
        new THREE.Vector3(box.max.x, box.min.y, box.max.z),
        new THREE.Vector3(box.max.x, box.max.y, box.min.z),
        new THREE.Vector3(box.max.x, box.max.y, box.max.z)
      ];
      return Math.max(...points.map((point) => {
        const local = point.clone();
        camera.worldToLocal(local);
        return local.z;
      }));
    }

    function getWeaponForwardScreenPoint(model, camera) {
      if (!model || !camera) return null;
      model.updateWorldMatrix(true, true);
      camera.updateWorldMatrix(true, true);
      const box = new THREE.Box3().setFromObject(model);
      const points = [
        new THREE.Vector3(box.min.x, box.min.y, box.min.z),
        new THREE.Vector3(box.min.x, box.min.y, box.max.z),
        new THREE.Vector3(box.min.x, box.max.y, box.min.z),
        new THREE.Vector3(box.min.x, box.max.y, box.max.z),
        new THREE.Vector3(box.max.x, box.min.y, box.min.z),
        new THREE.Vector3(box.max.x, box.min.y, box.max.z),
        new THREE.Vector3(box.max.x, box.max.y, box.min.z),
        new THREE.Vector3(box.max.x, box.max.y, box.max.z)
      ];

      let forwardPoint = null;
      let forwardCameraZ = Infinity;
      points.forEach((point) => {
        const cameraLocal = point.clone();
        camera.worldToLocal(cameraLocal);
        if (cameraLocal.z < forwardCameraZ) {
          forwardCameraZ = cameraLocal.z;
          forwardPoint = point;
        }
      });

      if (!forwardPoint) return null;
      const projected = forwardPoint.clone().project(camera);
      return {
        x: (projected.x + 1) * 0.5 * window.innerWidth,
        y: (1 - projected.y) * 0.5 * window.innerHeight,
        cameraZ: forwardCameraZ
      };
    }

      if (event.code === 'KeyK') setPoseMode('scope');
      if (event.code === 'KeyR') {
        if (currentWeaponKey === 'DVL10' && dvl10State.needsBolt) {
          event.preventDefault();
          dvl10State.autoBoltPending = false;
          dvl10State.autoBoltTimer = 0;
          startDVL10BoltCycle();
          return;
        }
      }
      if (event.code === 'KeyQ' || event.code === 'KeyE') {
        event.preventDefault();
        if (event.repeat) return;
        const key = event.code === 'KeyQ' ? 'q' : 'e';
        const oppositeKey = key === 'q' ? 'e' : 'q';
        keys[key] = !keys[key];
        keys[oppositeKey] = false;
      }
    });
    window.addEventListener('keyup', (event) => {
      if (event.code === 'KeyQ' || event.code === 'KeyE') {
        event.preventDefault();
      }
    });
    window.addEventListener('blur', () => {
      keys.q = false;
      keys.e = false;
    });

    window.addEventListener('contextmenu', (event) => event.preventDefault());
    window.addEventListener('mousedown', (event) => {
      if (event.button === 2) setAiming(true);
      if (event.button === 1 && event.target === renderer.domElement) {
        event.preventDefault();
        triggerFirePreview(1);
      }
      if (event.button === 0 && event.target === renderer.domElement) {
        renderer.domElement.requestPointerLock?.();
        triggerFirePreview(1);
      }
    });
    window.addEventListener('mouseup', (event) => {
      if (event.button === 2) setAiming(false);
    });
    window.addEventListener('wheel', (event) => {
      if (event.target?.closest?.('#panel')) return;
      event.preventDefault();
      triggerFirePreview(event.deltaY >= 0 ? 1 : -1);
    }, { passive: false });
    window.addEventListener('mousemove', (event) => {
      if (document.pointerLockElement !== renderer.domElement) return;
      yaw -= event.movementX * 0.002;
      pitch -= event.movementY * 0.002;
      pitch = THREE.MathUtils.clamp(pitch, -Math.PI / 2.2, Math.PI / 2.2);
    });
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);
      updateDVL10AutoBolt(delta);
      updateDVL10Bolt(delta);
      const fireProfile = getFirePreviewProfile();
      if (recoilTargetY > 0.0001) {
        const nextRecoil = THREE.MathUtils.lerp(recoilTargetY, 0, Math.min(1, delta * fireProfile.recover));
        pitch += (recoilTargetY - nextRecoil) * 0.55;
        recoilTargetY = nextRecoil;
      } else {
        recoilTargetY = 0;
      }
      pitch = THREE.MathUtils.clamp(pitch, -Math.PI / 2.2, Math.PI / 2.2);
      fireMotionTime += delta;
      fireKickAmount = THREE.MathUtils.lerp(fireKickAmount, 0, Math.min(1, delta * fireProfile.recover));
      if (fireKickAmount < 0.001) fireKickAmount = 0;
      const fireShake = Math.sin(fireMotionTime * 58) * fireKickAmount;
      const aimRecoilScale = isAiming ? 0.34 : 0.5;
      fireWeaponOffsetPos.set(
        fireSide * fireShake * fireProfile.yaw * 0.22,
        recoilTargetY * aimRecoilScale + fireProfile.lift * fireKickAmount,
        fireProfile.back * fireKickAmount
      );
      fireWeaponOffsetRot.set(
        fireProfile.pitch * fireKickAmount + recoilTargetY * 0.55,
        fireSide * fireProfile.yaw * fireKickAmount,
        -fireSide * fireProfile.roll * fireKickAmount
      );

      leanTarget = keys.q === keys.e ? 0 : keys.q ? -1 : 1;
      leanAmount = THREE.MathUtils.lerp(leanAmount, leanTarget, Math.min(1, delta * 10));
      cameraRollZ = -leanAmount * LEAN_CAMERA_ROLL;
      appliedLeanOffset.set(
        Math.cos(yaw) * LEAN_CAMERA_SIDE * leanAmount,
        -LEAN_CAMERA_DROP * Math.abs(leanAmount),
        -Math.sin(yaw) * LEAN_CAMERA_SIDE * leanAmount
      );
      camera.position.copy(cameraBasePosition).add(appliedLeanOffset);
      camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, cameraRollZ, 'YXZ'));

      const pose = getRenderPose();
      targetLocalPos.copy(pose.position);
      targetLocalPos.add(fireWeaponOffsetPos);
      if (currentWeaponKey === 'DVL10') {
        targetLocalPos.add(dvl10ActionWeaponOffsetPos);
      }
      currentLocalPos.lerp(targetLocalPos, isAiming ? 0.28 : 0.22);

      const leanWeaponScale = isAiming ? 0.2 : 1;
      leanWeaponOffsetPos.set(
        leanAmount * 0.055 * leanWeaponScale,
        -Math.abs(leanAmount) * 0.025 * leanWeaponScale,
        Math.abs(leanAmount) * 0.02 * leanWeaponScale
      );
      leanWeaponOffsetRot.set(
        0,
        leanAmount * 0.025 * leanWeaponScale,
        -leanAmount * 0.08 * leanWeaponScale
      );

      weaponGroup.position.copy(currentLocalPos).add(leanWeaponOffsetPos).applyQuaternion(camera.quaternion).add(camera.position);
      const actionQuat =
        currentWeaponKey === 'DVL10'
          ? new THREE.Quaternion().setFromEuler(dvl10ActionWeaponOffsetRot)
          : new THREE.Quaternion();
      const combinedQuat = camera.quaternion.clone()
        .multiply(new THREE.Quaternion().setFromEuler(pose.rotation))
        .multiply(new THREE.Quaternion().setFromEuler(fireWeaponOffsetRot))
        .multiply(actionQuat)
        .multiply(new THREE.Quaternion().setFromEuler(leanWeaponOffsetRot));
      weaponGroup.quaternion.copy(combinedQuat).multiply(r180Y);

      updateMetrics();
      let fireMetricValue = fireKickAmount > 0 || recoilTargetY > 0
        ? `recoil ${recoilTargetY.toFixed(3)}`
        : 'ready';
      if (currentWeaponKey === 'DVL10' && fireKickAmount <= 0 && recoilTargetY <= 0) {
        fireMetricValue = dvl10State.cyclingBolt
          ? 'cycling bolt'
          : dvl10State.autoBoltPending
            ? 'auto bolt pending'
            : dvl10State.needsBolt
            ? 'bolt needed'
            : dvl10State.chambered
              ? 'ready'
              : 'empty chamber';
      }
      fireMetric.querySelector('strong').textContent = fireMetricValue;
      const activeEdit = getActivePose();
      const forwardScreenPoint = currentWeaponKey === 'DVL10'
        ? getWeaponForwardScreenPoint(WEAPONS[currentWeaponKey].mesh, camera)
        : null;
      const dvl10Hud = currentWeaponKey === 'DVL10' ? `
DVL bolt: ${dvl10State.cyclingBolt ? 'cycling' : dvl10State.needsBolt ? 'needed' : 'ready'}
autoBoltPending: ${dvl10State.autoBoltPending}
autoBoltTimer: ${dvl10State.autoBoltTimer.toFixed(2)}
chambered: ${dvl10State.chambered}
ammoInMag: ${dvl10State.ammoInMag}
bolt mesh: ${dvl10BoltMesh ? dvl10BoltMesh.userData.dvl10BoltName || dvl10BoltMesh.name : 'missing'}
bolt axis: X
bolt travel: ${DVL10_BOLT_ACTION.travelAxis}${DVL10_BOLT_ACTION.travelSign >= 0 ? '+' : '-'} ${DVL10_BOLT_ACTION.travel.toFixed(3)}
bolt pivot offset: ${DVL10_BOLT_PIVOT.offset.x.toFixed(4)}, ${DVL10_BOLT_PIVOT.offset.y.toFixed(4)}, ${DVL10_BOLT_PIVOT.offset.z.toFixed(4)}
action rot: ${dvl10ActionWeaponOffsetRot.x.toFixed(3)}, ${dvl10ActionWeaponOffsetRot.y.toFixed(3)}, ${dvl10ActionWeaponOffsetRot.z.toFixed(3)}
action signs: yaw ${DVL10_ACTION_POSE.yawSign}, roll ${DVL10_ACTION_POSE.rollSign}
forward screen: ${forwardScreenPoint ? `${forwardScreenPoint.x.toFixed(1)}, ${forwardScreenPoint.y.toFixed(1)}` : '-'}` : '';
      hud.innerHTML = `<strong>${WEAPONS[currentWeaponKey].name}</strong>
mode: ${isAiming ? 'ADS' : 'HIP'} / editing: ${activePoseKey.toUpperCase()}
lean: ${leanAmount.toFixed(2)} / camera roll: ${cameraRollZ.toFixed(3)}
fire: ${fireMetricValue} / wheel shots: ${fireCount}
${activePoseKey === 'scope' ? 'scope' : 'pose'} position: ${formatVec(activeEdit.position)}
${activePoseKey === 'scope' ? 'scope' : 'pose'} rotation: ${formatVec(activeEdit.rotation)}
${activePoseKey === 'scope' ? `scope scale: ${formatVec(activeEdit.scale)}\n` : ''}nearest z: ${lastNearestZ == null ? '-' : lastNearestZ.toFixed(4)}${dvl10Hud}`;

      renderer.render(scene, camera);
    }

    buildControls();
    buildDVL10BoltPivotControls();
    applyScopePose();
    setWeapon('M4A1');
    setPoseMode('hip');
    setAiming(false);
    currentLocalPos.copy(WEAPON_VIEW_POSES.M4A1.hip.position);
    animate();
  </script>
</body>
</html>
